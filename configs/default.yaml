# Пути к данным
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  dataset_name: "brain-tumor" # Медицинский датасет детекции опухолей головного мозга

# Параметры обучения (оптимальные для локального компьютера)
training:
  epochs: 10            # 10 эпох хватит для демонстрации обучения пяти моделей
  batch_size: 4         # батч из 4 снимков МРТ, чтобы не перегружать память
  lr: 0.001             # скорость обучения (learning rate)
  optimizer: "Adam"     # оптимизатор
  img_size: 640         # стандартный размер снимков для детекции

# Список 5 обязательных моделей по твоему заданию
models:
  - "yolo"
  - "faster_rcnn"
  - "ssd"
  - "efficientdet"
  - "detr"